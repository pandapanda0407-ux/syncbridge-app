<section class="hero" id="home">
  <div class="hero-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="container hero-content">
<h1 class="hero-title">
      Manage <span class="gradient-text">Etsy & Shopify</span><br>
      From One Dashboard
    </h1>

    <p class="hero-subtitle">
      SyncBridge automatically syncs your orders, inventory, and analytics across
      both platforms in real time — so you can focus on growing your business,
      not switching between tabs.
    </p>

    <div class="hero-actions">
      <button class="btn-primary" (click)="scrollToContact()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="currentColor"/>
        </svg>
        Start Free Trial
      </button>
      <button class="btn-secondary" (click)="scrollToFeatures()">
        See How It Works
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="platform-logos">
      <span class="platform-label">Integrates with</span>
      <div class="logos">
        <div class="platform-chip">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="4" fill="#F1641E"/>
            <path d="M7 7h10v10H7z" fill="white" opacity="0.9"/>
          </svg>
          Etsy
        </div>
        <div class="divider-dot"></div>
        <div class="platform-chip">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="4" fill="#96BF48"/>
            <path d="M12 4l8 14H4L12 4z" fill="white" opacity="0.9"/>
          </svg>
          Shopify
        </div>
      </div>
    </div>

  </div>
</section>
